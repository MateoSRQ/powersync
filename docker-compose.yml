services:
  postgres:
    container_name: powersync_postgres
    image: postgres:16
    restart: unless-stopped
    command: 
      - "postgres"
      - "-c"
      - "wal_level=logical"
      - "-c"
      - "max_replication_slots=5"
      - "-c"
      - "max_wal_senders=5"
    environment:
      POSTGRES_USER: powersyncuser
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: powertest
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  powersync:
    container_name: powersync_service
    image: journeyapps/powersync-service:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    command: ["start", "-r", "unified"]
    environment:
      POWERSYNC_CONFIG_PATH: /config/powersync.yaml 
    volumes:
      # THE BULLETPROOF FIX: Mount the entire GitHub repo folder to /config
      # This completely bypasses the EISDIR file bug.
      - ./:/config:ro

volumes:
  postgres_data:
