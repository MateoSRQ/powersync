services:
  postgres:
    container_name: powersync_postgres
    image: postgres:16
    restart: unless-stopped
    command: 
      - "postgres"
      - "-c"
      - "wal_level=logical"
      - "-c"
      - "max_replication_slots=5"
      - "-c"
      - "max_wal_senders=5"
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: mydatabase
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  powersync:
    container_name: powersync_service
    image: journeyapps/powersync-service:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    command: ["start", "-r", "unified"]
    environment:
      PS_CONFIG_PATH: /config/powersync.yaml 
    volumes:
      # If using GitHub: leave as ./powersync.yaml
      # If using Web Editor: change to absolute paths like /opt/powersync/powersync.yaml
      - ./powersync.yaml:/config/powersync.yaml:ro
      - ./sync-config.yaml:/config/sync-config.yaml:ro

# This section can only exist ONCE at the very end of the file
volumes:
  postgres_data:
