services:
  postgres:
    container_name: powersync_postgres
    image: postgres:16
    restart: unless-stopped
    command: 
      - "postgres"
      - "-c"
      - "wal_level=logical"
      - "-c"
      - "max_replication_slots=5"
      - "-c"
      - "max_wal_senders=5"
    environment:
      POSTGRES_USER: powersyncuser
      POSTGRES_PASSWORD: password.123
      POSTGRES_DB: powertest
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  powersync:
    container_name: powersync_service
    image: journeyapps/powersync-service:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    command: ["start", "-r", "unified"]
    environment:
      # THE FIX: POWERSYNC_CONFIG_PATH instead of PS_CONFIG_PATH
      POWERSYNC_CONFIG_PATH: /config/powersync.yaml 
    volumes:
      - ./powersync.yaml:/config/powersync.yaml:ro
      - ./sync-config.yaml:/config/sync-config.yaml:ro

volumes:
  postgres_data:
